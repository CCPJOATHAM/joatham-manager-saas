{% extends "joatham_clients/base.html" %}

{% block clients_title %}Ajouter un client{% endblock %}
{% block clients_subtitle %}Enregistrez un nouveau client dans la base de votre entreprise.{% endblock %}

{% block content %}
<style>
    .form-card {
        max-width: 760px;
        background: #fff;
        border: 1px solid #dde7f0;
        border-radius: 20px;
        padding: 24px;
    }

    .form-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
    }

    .field {
        display: flex;
        flex-direction: column;
        gap: 8px;
    }

    .field.full {
        grid-column: 1 / -1;
    }

    .field label {
        font-weight: 700;
        color: #10233f;
    }

    .field input {
        width: 100%;
        padding: 12px 14px;
        border-radius: 12px;
        border: 1px solid #d7dee7;
    }

    .submit-btn {
        margin-top: 18px;
        min-height: 44px;
        padding: 0 18px;
        border-radius: 12px;
        border: 0;
        background: #0f766e;
        color: #fff;
        font-weight: 700;
        cursor: pointer;
    }
</style>

<div class="form-card">
    <form method="post">
        {% csrf_token %}
        <div class="form-grid">
            <div class="field full">
                <label for="id_nom">Nom</label>
                <input id="id_nom" type="text" name="nom" placeholder="Nom du client" required>
            </div>
            <div class="field">
                <label for="id_telephone">Téléphone</label>
                <input id="id_telephone" type="text" name="telephone" placeholder="+243...">
            </div>
            <div class="field">
                <label for="id_email">E-mail</label>
                <input id="id_email" type="email" name="email" placeholder="client@example.com">
            </div>
        </div>
        <button type="submit" class="submit-btn">Enregistrer le client</button>
    </form>
</div>
{% endblock %}
