<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mot de passe oublie | JOATHAM Manager</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #eef4fb 0%, #f9fbfd 48%, #edf4f0 100%);
            display: grid;
            place-items: center;
            padding: 24px;
            color: #10233f;
        }

        .card {
            width: 100%;
            max-width: 560px;
            background: #fff;
            border: 1px solid #dde7f0;
            border-radius: 26px;
            box-shadow: 0 24px 60px rgba(15, 23, 42, 0.12);
            padding: 38px 34px;
        }

        h1 { margin: 0 0 12px; font-size: 1.9rem; letter-spacing: -0.03em; }
        p { margin: 0 0 18px; color: #64748b; line-height: 1.7; }
        label { display: block; margin-bottom: 8px; font-weight: 700; }
        input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #cbd5e1;
            border-radius: 14px;
            font-size: 1rem;
            box-sizing: border-box;
            margin-bottom: 16px;
        }

        button {
            width: 100%;
            border: none;
            border-radius: 14px;
            padding: 14px 18px;
            background: linear-gradient(135deg, #0f766e, #0b5f58);
            color: #fff;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
        }

        .help-link {
            display: inline-block;
            margin-top: 18px;
            color: #0f766e;
            text-decoration: none;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>Mot de passe oublie</h1>
        <p>Saisissez votre adresse email. Si un compte existe, nous enverrons un lien de reinitialisation securise.</p>
        <form method="post">
            {% csrf_token %}
            <label for="{{ form.email.id_for_label }}">Adresse email</label>
            {{ form.email }}
            <button type="submit">Envoyer le lien</button>
        </form>
        <a class="help-link" href="{% url 'login' %}">Retour a la connexion</a>
    </main>
</body>
</html>
