<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mot de passe mis a jour | JOATHAM Manager</title>
    <meta http-equiv="refresh" content="{{ redirect_delay_seconds }};url={{ login_url }}">
    <style>
        :root {
            --bg-a: #0f172a;
            --bg-b: #1d4ed8;
            --panel: rgba(255, 255, 255, 0.95);
            --text: #0f172a;
            --muted: #475569;
            --accent: #0f766e;
            --accent-soft: #ccfbf1;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background:
                radial-gradient(circle at top left, rgba(45, 212, 191, 0.22), transparent 34%),
                radial-gradient(circle at bottom right, rgba(59, 130, 246, 0.28), transparent 38%),
                linear-gradient(135deg, var(--bg-a) 0%, #10223f 42%, var(--bg-b) 100%);
            display: grid;
            place-items: center;
            padding: 28px;
            color: var(--text);
        }

        .card {
            width: 100%;
            max-width: 620px;
            background: var(--panel);
            border-radius: 30px;
            box-shadow: 0 32px 90px rgba(15, 23, 42, 0.35);
            padding: 42px 36px;
        }

        .chip {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border-radius: 999px;
            background: var(--accent-soft);
            color: var(--accent);
            font-weight: 700;
        }

        .chip::before {
            content: "";
            width: 10px;
            height: 10px;
            border-radius: 999px;
            background: var(--accent);
        }

        h1 { margin: 22px 0 12px; font-size: 2.2rem; letter-spacing: -0.04em; }
        p { margin: 0 0 18px; color: var(--muted); line-height: 1.75; }
        .cta {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 48px;
            padding: 0 18px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 700;
            background: linear-gradient(135deg, #0f766e, #0b5f58);
            color: #fff;
        }
        .countdown { font-weight: 700; color: var(--text); }
    </style>
</head>
<body>
    <main class="card">
        <div class="chip">Succes</div>
        <h1>Mot de passe mis a jour</h1>
        <p>Votre mot de passe a ete reinitialise avec succes. Vous allez etre redirige automatiquement vers la page de connexion dans <span class="countdown" id="countdown">{{ redirect_delay_seconds }}</span> secondes.</p>
        <a class="cta" href="{{ login_url }}">Se connecter maintenant</a>
    </main>
    <script>
        (function () {
            var countdown = document.getElementById("countdown");
            if (!countdown) return;
            var remaining = parseInt(countdown.textContent, 10) || 0;
            window.setInterval(function () {
                remaining = Math.max(remaining - 1, 0);
                countdown.textContent = remaining;
            }, 1000);
        }());
    </script>
</body>
</html>
