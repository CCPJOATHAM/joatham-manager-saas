<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <title>Nouvelle inscription - JOATHAM Manager</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f6f7fb; margin: 0; padding: 24px; }
        .container { max-width: 760px; margin: 0 auto; background: #fff; padding: 24px; border-radius: 10px; box-shadow: 0 2px 10px rgba(15, 23, 42, 0.08); }
        .field { display: flex; flex-direction: column; margin-bottom: 16px; }
        label { margin-bottom: 6px; font-weight: bold; }
        input, select { padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; }
        .actions { margin-top: 20px; display: flex; gap: 12px; }
        button, a { padding: 10px 14px; border-radius: 6px; text-decoration: none; }
        button { border: none; background: #0f766e; color: white; cursor: pointer; }
        a { background: #e5e7eb; color: #111827; }
        .error { background: #fee2e2; color: #991b1b; padding: 12px; border-radius: 6px; margin-bottom: 16px; }
    </style>
</head>
<body>
<div class="container">
    <h1>Inscrire un apprenant</h1>
    <p>Entreprise: {{ entreprise.nom }}</p>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <div class="field">
            <label for="apprenant">Apprenant</label>
            <select id="apprenant" name="apprenant" required>
                <option value="">Choisir un apprenant</option>
                {% for apprenant in apprenants %}
                    <option value="{{ apprenant.id }}">{{ apprenant.nom }} {{ apprenant.prenom }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="field">
            <label for="formation">Formation</label>
            <select id="formation" name="formation" required>
                <option value="">Choisir une formation</option>
                {% for formation in formations %}
                    <option value="{{ formation.id }}">{{ formation.nom }} - {{ formation.prix }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="field">
            <label for="statut">Statut</label>
            <select id="statut" name="statut">
                {% for value, label in statuts %}
                    <option value="{{ value }}">{{ label }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="field">
            <label for="montant_prevu">Montant prevu</label>
            <input id="montant_prevu" name="montant_prevu" placeholder="Laisser vide pour reprendre le prix de la formation">
        </div>

        <div class="field">
            <label for="montant_paye">Montant paye</label>
            <input id="montant_paye" name="montant_paye" value="0.00">
        </div>

        <div class="actions">
            <button type="submit">Enregistrer l'inscription</button>
            <a href="{% url 'apprenant_list' %}">Retour</a>
        </div>
    </form>
</div>
</body>
</html>
